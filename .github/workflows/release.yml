name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance (Sigstore OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Validate release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi
      - run: npm run typecheck
      - run: npm test
      - run: npm run audit:prod
      - run: npm run build
      - name: Check npm version
        id: npm_version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance --access public
        if: steps.npm_version.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
