# Publish to npm with provenance on a version tag.
# Before tagging a public release, ensure package.json has the final public repository URL,
# "private" is false, and NPM_TOKEN is configured in repository secrets.
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write # required for npm provenance (Sigstore OIDC)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run audit:prod
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
